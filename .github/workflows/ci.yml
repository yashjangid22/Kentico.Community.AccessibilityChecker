name: "CI: Build and Test"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  dotnet-format:
    name: .Net Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Run dotnet format
        run: dotnet format XperienceCommunity.AccessibilityChecker.slnx --exclude ./examples/** --verify-no-changes

  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: dotnet-format
    defaults:
      run:
        shell: pwsh

    env:
      ASPNETCORE_ENVIRONMENT: CI
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_NOLOGO: 1

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Install Client npm dependencies
        run: npm ci
        working-directory: src/XperienceCommunity.AccessibilityChecker/Client

      - name: Install dependencies
        run: |
          dotnet restore src/XperienceCommunity.AccessibilityChecker.Libs.slnx `
            --locked-mode

      - name: Build Solution
        run: |
          dotnet build src/XperienceCommunity.AccessibilityChecker.Libs.slnx `
            --configuration Release `
            --no-restore

      - name: Test Solution
        run: |
          dotnet test src/XperienceCommunity.AccessibilityChecker.Libs.slnx `
            --configuration Release `
            --no-build `
            --no-restore
